<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON QA Diff Tool - README Guide</title>
  <script>
    (function initThemeEarly() {
      const key = 'jsonQaTheme';
      const storedTheme = localStorage.getItem(key);
      const mode = (storedTheme === 'dark' || storedTheme === 'light' || storedTheme === 'system')
        ? storedTheme
        : 'system';
      const theme = mode === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : mode;
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('data-theme-mode', mode);
      document.documentElement.classList.toggle('dark', theme === 'dark');
    })();
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.8.1/github-markdown.min.css">
  <style>
    :root {
      --page-bg: #f6f8fa;
      --card-bg: #ffffff;
      --border: #d0d7de;
      --text: #24292f;
      --muted: #57606a;
      --link: #0969da;
      --table-bg: #ffffff;
      --table-border: #c8d1dc;
      --table-text: #0f172a;
      --table-head-bg: #eaf0f7;
      --table-row-alt: #f7fafe;
      --table-row-hover: #e6f0ff;
      color-scheme: light;
    }

    html[data-theme='dark'] {
      --page-bg: #0b1220;
      --card-bg: #111827;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --link: #7dd3fc;
      --table-bg: #0f172a;
      --table-border: #334155;
      --table-text: #e2e8f0;
      --table-head-bg: #111f34;
      --table-row-alt: #0b1528;
      --table-row-hover: #1a2a42;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--page-bg);
      color: var(--text);
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .topbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--page-bg);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--page-bg);
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      min-width: 112px;
      justify-content: center;
    }

    .home-link:hover,
    .theme-toggle:hover {
      background: color-mix(in srgb, var(--page-bg) 75%, var(--text) 25%);
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      overflow: hidden;
    }

    .card-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      background: var(--card-bg);
    }

    .markdown-body {
      background: var(--card-bg);
      padding: 24px;
      color: var(--text);
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      background: var(--table-bg);
      color: var(--table-text);
      border: 1px solid var(--table-border);
    }

    .markdown-body table th,
    .markdown-body table td {
      border: 1px solid var(--table-border);
      color: var(--table-text);
    }

    .markdown-body table th {
      background: var(--table-head-bg);
      font-weight: 600;
    }

    .markdown-body table tr:nth-child(odd) td {
      background: var(--table-bg);
    }

    .markdown-body table tr:nth-child(even) td {
      background: var(--table-row-alt);
    }

    .markdown-body table tr:hover td {
      background: var(--table-row-hover);
    }

    html[data-theme='dark'] .markdown-body {
      --color-prettylights-syntax-comment: #64748b;
      --color-prettylights-syntax-constant: #fda4af;
      --color-prettylights-syntax-entity: #c4b5fd;
      --color-prettylights-syntax-storage-modifier-import: #cbd5e1;
      --color-prettylights-syntax-entity-tag: #93c5fd;
      --color-prettylights-syntax-keyword: #f9a8d4;
      --color-prettylights-syntax-string: #86efac;
      --color-prettylights-syntax-variable: #fcd34d;
      --color-prettylights-syntax-brackethighlighter-unmatched: #fda4af;
      --color-prettylights-syntax-invalid-illegal-text: #f8fafc;
      --color-prettylights-syntax-invalid-illegal-bg: #be123c;
      --color-prettylights-syntax-carriage-return-text: #f8fafc;
      --color-prettylights-syntax-carriage-return-bg: #be123c;
      --color-prettylights-syntax-string-regexp: #67e8f9;
      --color-prettylights-syntax-markup-list: #fcd34d;
      --color-prettylights-syntax-markup-heading: #93c5fd;
      --color-prettylights-syntax-markup-italic: #cbd5e1;
      --color-prettylights-syntax-markup-bold: #f8fafc;
      --color-prettylights-syntax-markup-deleted-text: #fecaca;
      --color-prettylights-syntax-markup-deleted-bg: #7f1d1d;
      --color-prettylights-syntax-markup-inserted-text: #bbf7d0;
      --color-prettylights-syntax-markup-inserted-bg: #14532d;
      --color-prettylights-syntax-markup-changed-text: #fde68a;
      --color-prettylights-syntax-markup-changed-bg: #78350f;
      --color-prettylights-syntax-markup-ignored-text: #dbeafe;
      --color-prettylights-syntax-markup-ignored-bg: #1e3a8a;
      --color-prettylights-syntax-meta-diff-range: #a5b4fc;
      --color-prettylights-syntax-brackethighlighter-angle: #94a3b8;
      --color-prettylights-syntax-sublimelinter-gutter-mark: #475569;
      --color-prettylights-syntax-constant-other-reference-link: #67e8f9;
      --color-fg-default: #e2e8f0;
      --color-fg-muted: #94a3b8;
      --color-fg-subtle: #64748b;
      --color-canvas-default: #111827;
      --color-canvas-subtle: #0f172a;
      --color-border-default: #334155;
      --color-border-muted: #1e293b;
      --color-neutral-muted: rgba(148, 163, 184, 0.2);
      --color-accent-fg: #7dd3fc;
      --color-accent-emphasis: #0284c7;
      --color-attention-subtle: rgba(250, 204, 21, 0.12);
      --color-danger-fg: #fda4af;
    }

    .status {
      padding: 18px;
      border-left: 4px solid #d0d7de;
      color: var(--muted);
      background: #f6f8fa;
      font-size: 14px;
    }

    .status.error {
      border-left-color: #d1242f;
      color: #cf222e;
      background: #fff8f8;
    }

    .status a {
      color: var(--link);
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px 10px 28px;
      }

      .markdown-body {
        padding: 16px;
      }

      .title {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <h1 class="title">JSON QA Diff Tool Documentation</h1>
      <div class="topbar-actions">
        <button type="button" class="theme-toggle" data-theme-toggle="true" aria-label="Switch theme" title="Switch theme">
          <span data-theme-icon="true" aria-hidden="true">🖥️</span>
          <span data-theme-label="true">Theme: System</span>
        </button>
        <a class="home-link" href="index.html" aria-label="Back to app">← Back to App</a>
      </div>
    </div>

    <section class="card" aria-live="polite">
      <div class="card-header">README.md (source of truth for app guidance)</div>
      <article id="readmeContent" class="markdown-body">
        <div class="status">Loading README.md...</div>
      </article>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const themeStorageKey = 'jsonQaTheme';
    const themeModes = ['system', 'dark', 'light'];

    function resolveThemeMode() {
      const storedTheme = localStorage.getItem(themeStorageKey);
      if (themeModes.includes(storedTheme)) return storedTheme;
      if (storedTheme === 'dark' || storedTheme === 'light') return storedTheme;
      return 'system';
    }

    function resolveThemeFromMode(mode) {
      if (mode === 'dark' || mode === 'light') return mode;
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function nextThemeMode(mode) {
      const systemTheme = resolveThemeFromMode('system');
      const oppositeTheme = systemTheme === 'dark' ? 'light' : 'dark';

      if (mode === 'system') return oppositeTheme;
      if (mode === oppositeTheme) return systemTheme;
      if (mode === systemTheme) return 'system';
      return 'system';
    }

    function applyTheme(mode) {
      const nextMode = themeModes.includes(mode) ? mode : 'system';
      const nextTheme = resolveThemeFromMode(nextMode);
      document.documentElement.setAttribute('data-theme', nextTheme);
      document.documentElement.setAttribute('data-theme-mode', nextMode);
      document.documentElement.classList.toggle('dark', nextTheme === 'dark');

      const modeLabel = nextMode[0].toUpperCase() + nextMode.slice(1);
      const modeIcon = nextMode === 'system' ? '🖥️' : (nextMode === 'dark' ? '🌙' : '☀️');
      const nextModeLabel = nextThemeMode(nextMode);
      document.querySelectorAll('[data-theme-toggle="true"]').forEach((button) => {
        button.setAttribute('aria-label', `Switch theme mode. Current mode: ${modeLabel}`);
        button.setAttribute('title', `Theme mode: ${modeLabel}. Click to switch to ${nextModeLabel}.`);

        const iconEl = button.querySelector('[data-theme-icon="true"]');
        const labelEl = button.querySelector('[data-theme-label="true"]');
        if (iconEl) iconEl.textContent = modeIcon;
        if (labelEl) labelEl.textContent = `Theme: ${modeLabel}`;
      });
    }

    function setThemeMode(mode) {
      const nextMode = themeModes.includes(mode) ? mode : 'system';
      localStorage.setItem(themeStorageKey, nextMode);
      applyTheme(nextMode);
    }

    function initThemeToggle() {
      applyTheme(resolveThemeMode());

      document.querySelectorAll('[data-theme-toggle="true"]').forEach((button) => {
        button.addEventListener('click', () => {
          const currentMode = document.documentElement.getAttribute('data-theme-mode') || resolveThemeMode();
          setThemeMode(nextThemeMode(currentMode));
        });
      });

      const themeMedia = window.matchMedia('(prefers-color-scheme: dark)');
      if (themeMedia && typeof themeMedia.addEventListener === 'function') {
        themeMedia.addEventListener('change', () => {
          const currentMode = document.documentElement.getAttribute('data-theme-mode') || resolveThemeMode();
          if (currentMode !== 'system') return;
          applyTheme('system');
        });
      }
    }

    function slugifyHeading(text) {
      return (text || '')
        .toLowerCase()
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9\s-]/g, ' ')
        .trim()
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function normalizeReadmeAnchors(container) {
      const headingEls = [...container.querySelectorAll('h1, h2, h3, h4, h5, h6')];
      const headingIdCounts = new Map();

      headingEls.forEach((heading) => {
        const baseId = slugifyHeading(heading.textContent) || 'section';
        const seen = headingIdCounts.get(baseId) || 0;
        headingIdCounts.set(baseId, seen + 1);

        const resolvedId = seen === 0 ? baseId : `${baseId}-${seen}`;
        heading.id = resolvedId;
      });

      const validIds = new Set(headingEls.map((heading) => heading.id));
      const hashLinks = [...container.querySelectorAll('a[href^="#"]')];

      hashLinks.forEach((link) => {
        const href = link.getAttribute('href') || '';
        const rawHash = decodeURIComponent(href.slice(1));
        if (!rawHash) return;

        if (validIds.has(rawHash)) return;

        const noLeadingDash = rawHash.replace(/^-+/, '');
        if (validIds.has(noLeadingDash)) {
          link.setAttribute('href', `#${noLeadingDash}`);
          return;
        }

        const normalized = slugifyHeading(noLeadingDash.replace(/-/g, ' '));
        if (validIds.has(normalized)) {
          link.setAttribute('href', `#${normalized}`);
        }
      });
    }

    (async function renderReadme() {
      initThemeToggle();
      localStorage.setItem('jsonQaReadmeVisited', '1');
      const container = document.getElementById('readmeContent');
      try {
        const res = await fetch('./README.md', { cache: 'no-cache' });
        if (!res.ok) {
          throw new Error('HTTP ' + res.status + ' when requesting README.md');
        }

        const markdown = await res.text();
        if (!markdown.trim()) {
          container.innerHTML = '<div class="status error">README.md is empty. Add documentation content to display the app guide here.</div>';
          return;
        }

        container.innerHTML = marked.parse(markdown, {
          gfm: true,
          breaks: false,
          headerIds: true,
          mangle: false
        });

        normalizeReadmeAnchors(container);
      } catch (error) {
        container.innerHTML = [
          '<div class="status error">',
          '<strong>Could not load README.md.</strong><br>',
          'This documentation page loads README.md over HTTP (for example, GitHub Pages or a local dev server). ',
          'If opened with file://, the browser may block file loading.<br><br>',
          'Technical details: ' + (error && error.message ? error.message : String(error)),
          '</div>'
        ].join('');
      }
    })();
  </script>
</body>
</html>
